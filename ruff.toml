# Exclude a variety of commonly ignored directories.
exclude = [
    ".claude",
    ".ruff_cache",
    ".venv",
    ".vscode",
]

[lint]
select = [
    "B",  # flake8-bugbear checks
    "D",  # pydocstyle docstring checks
    "E",  # pycodestyle errors
    "F",  # pyflakes errors
    "I",  # isort import sorting checks
    "W",  # pycodestyle warnings
]

ignore = [
    "D203",  # conflicts with D211 (no-blank-line-before-class); D211 wins
    "D213",  # conflicts with D212 (multi-line-summary-first-line); D212 wins
]